<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlassChat - Secure Anonymous Rooms</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-blur: blur(12px);
        }

        .dark {
            --glass-bg: rgba(0, 0, 0, 0.2);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        .dark body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
        }

        .chat-bubble {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            margin-bottom: 0.5rem;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bubble-left {
            background: rgba(255, 255, 255, 0.15);
            align-self: flex-start;
            border-bottom-left-radius: 0.2rem;
        }

        .bubble-right {
            background: rgba(99, 102, 241, 0.4);
            align-self: flex-end;
            border-bottom-right-radius: 0.2rem;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .typing-indicator {
            font-size: 0.8rem;
            font-style: italic;
            opacity: 0.7;
            height: 1.2rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center">

    <!-- Main Container -->
    <div id="app" class="w-full max-w-2xl glass shadow-2xl overflow-hidden flex flex-col h-[85vh]">
        
        <!-- Header -->
        <div class="p-4 border-b border-white/10 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-500/20 rounded-lg">
                    <i data-lucide="message-square" class="text-indigo-400 w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-white font-bold text-lg leading-none">GlassChat</h1>
                    <span id="room-status" class="text-white/50 text-xs">Secure Anonymous Chat</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="theme-toggle" class="p-2 text-white/70 hover:text-white hover:bg-white/10 rounded-full transition-all">
                    <i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i>
                </button>
                <div id="online-count-badge" class="hidden flex items-center gap-1.5 px-3 py-1 bg-green-500/20 text-green-400 rounded-full text-xs font-medium">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    <span id="online-count">0</span> Online
                </div>
            </div>
        </div>

        <!-- Content Area -->
        <div id="content" class="flex-1 overflow-hidden flex flex-col">
            
            <!-- Landing Screen (Create/Join) -->
            <div id="landing-screen" class="flex-1 p-6 flex flex-col justify-center gap-8">
                
                <!-- Create Room -->
                <div class="space-y-4">
                    <h2 class="text-white font-semibold text-xl flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-5 h-5 text-indigo-400"></i>
                        Create a Room
                    </h2>
                    <div class="grid gap-3">
                        <input type="text" id="create-room-id" placeholder="Room Name (e.g. SecretMeeting)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white placeholder:text-white/30 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        <input type="password" id="create-room-pass" placeholder="Password" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white placeholder:text-white/30 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        <button id="btn-create-room" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-500/20 transition-all active:scale-95">
                            Create & Join
                        </button>
                    </div>
                </div>

                <div class="relative">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-indigo-900/20 px-2 text-white/30">OR</span></div>
                </div>

                <!-- Join Room -->
                <div class="space-y-4">
                    <h2 class="text-white font-semibold text-xl flex items-center gap-2">
                        <i data-lucide="log-in" class="w-5 h-5 text-indigo-400"></i>
                        Join a Room
                    </h2>
                    <div class="grid gap-3">
                        <input type="text" id="join-room-id" placeholder="Room Name" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white placeholder:text-white/30 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        <input type="password" id="join-room-pass" placeholder="Password" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-white placeholder:text-white/30 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        <button id="btn-join-room" class="w-full bg-white/10 hover:bg-white/20 text-white font-bold py-3 rounded-xl border border-white/10 transition-all active:scale-95">
                            Join Room
                        </button>
                    </div>
                </div>
            </div>

            <!-- Chat Screen -->
            <div id="chat-screen" class="hidden flex-1 flex flex-col overflow-hidden">
                <!-- Chat Info Bar -->
                <div class="px-4 py-2 bg-white/5 border-b border-white/10 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span id="active-room-name" class="text-white font-medium">Room</span>
                        <button id="btn-copy-id" class="p-1.5 text-white/50 hover:text-white transition-all" title="Copy Room ID">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <button id="btn-finish-chat" class="text-xs font-bold px-3 py-1.5 bg-red-500/20 text-red-400 hover:bg-red-500/30 rounded-lg transition-all flex items-center gap-1.5">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        Finish Chat
                    </button>
                </div>

                <!-- Messages Area -->
                <div id="messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col custom-scrollbar">
                    <!-- Messages will be injected here -->
                </div>

                <!-- Typing Indicator -->
                <div id="typing-indicator" class="px-4 py-1 typing-indicator text-white/50"></div>

                <!-- Input Area -->
                <div class="p-4 border-t border-white/10 bg-white/5">
                    <form id="chat-form" class="flex gap-2">
                        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder:text-white/30 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        <button type="submit" class="p-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl shadow-lg shadow-indigo-500/20 transition-all active:scale-95">
                            <i data-lucide="send" class="w-6 h-6"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 glass text-white text-sm font-medium shadow-2xl opacity-0 translate-y-4 transition-all duration-300 pointer-events-none z-50">
        Notification message
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, addDoc, serverTimestamp, getDocs, where } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // Firebase Configuration (Injected from environment)
        const firebaseConfig = {
            apiKey: "AIzaSyDfNApR-j-LZD6nM7beqZfCKTOlsPj2vhY",
            authDomain: "theta-strata-470210-u1.firebaseapp.com",
            projectId: "theta-strata-470210-u1",
            storageBucket: "theta-strata-470210-u1.firebasestorage.app",
            messagingSenderId: "970430379511",
            appId: "1:970430379511:web:6d7dd01a6cbcb84a9feaf2"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // App State
        let currentUser = null;
        let activeRoomId = null;
        let unsubscribeMessages = null;
        let unsubscribeRoom = null;
        let lastMessageTime = 0;
        let typingTimeout = null;

        // Initialize Lucide Icons
        lucide.createIcons();

        // --- Utility Functions ---

        async function hashPassword(password) {
            const msgUint8 = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, duration);
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            if (document.documentElement.classList.contains('dark')) {
                icon.setAttribute('data-lucide', 'sun');
            } else {
                icon.setAttribute('data-lucide', 'moon');
            }
            lucide.createIcons();
        }

        // --- Auth Logic ---

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                console.log("Authenticated as:", user.uid);
            } else {
                signInAnonymously(auth).catch(err => console.error("Auth error:", err));
            }
        });

        // --- Room Logic ---

        async function createRoom() {
            const roomId = document.getElementById('create-room-id').value.trim();
            const password = document.getElementById('create-room-pass').value;

            if (!roomId || !password) {
                showToast("Please enter room name and password");
                return;
            }

            try {
                const roomRef = doc(db, "rooms", roomId);
                const roomSnap = await getDoc(roomRef);

                if (roomSnap.exists()) {
                    showToast("Room already exists. Try a different name.");
                    return;
                }

                const passwordHash = await hashPassword(password);
                await setDoc(roomRef, {
                    name: roomId,
                    passwordHash: passwordHash,
                    users: [currentUser.uid],
                    finishStatus: { [currentUser.uid]: false },
                    lastActivity: serverTimestamp(),
                    typing: { [currentUser.uid]: false }
                });

                joinRoomUI(roomId);
            } catch (err) {
                console.error("Create room error:", err);
                showToast("Error creating room");
            }
        }

        async function joinRoom() {
            const roomId = document.getElementById('join-room-id').value.trim();
            const password = document.getElementById('join-room-pass').value;

            if (!roomId || !password) {
                showToast("Please enter room name and password");
                return;
            }

            try {
                const roomRef = doc(db, "rooms", roomId);
                const roomSnap = await getDoc(roomRef);

                if (!roomSnap.exists()) {
                    showToast("Room not found");
                    return;
                }

                const roomData = roomSnap.data();
                
                // Check inactivity (2 minutes)
                const lastActivity = roomData.lastActivity?.toDate();
                if (lastActivity && (new Date() - lastActivity > 120000)) {
                    await deleteDoc(roomRef);
                    showToast("Room expired due to inactivity");
                    return;
                }

                const passwordHash = await hashPassword(password);
                if (roomData.passwordHash !== passwordHash) {
                    showToast("Incorrect password");
                    return;
                }

                // Update users list
                const updatedUsers = Array.from(new Set([...(roomData.users || []), currentUser.uid]));
                const updatedFinishStatus = { ...(roomData.finishStatus || {}), [currentUser.uid]: false };
                const updatedTyping = { ...(roomData.typing || {}), [currentUser.uid]: false };

                await updateDoc(roomRef, {
                    users: updatedUsers,
                    finishStatus: updatedFinishStatus,
                    typing: updatedTyping,
                    lastActivity: serverTimestamp()
                });

                joinRoomUI(roomId);
            } catch (err) {
                console.error("Join room error:", err);
                showToast("Error joining room");
            }
        }

        function joinRoomUI(roomId) {
            activeRoomId = roomId;
            document.getElementById('landing-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('online-count-badge').classList.remove('hidden');
            document.getElementById('active-room-name').textContent = roomId;
            
            startChatListeners(roomId);
            showToast(`Joined room: ${roomId}`);
        }

        function startChatListeners(roomId) {
            // Listen for messages
            const messagesRef = collection(db, "rooms", roomId, "messages");
            const q = query(messagesRef, orderBy("timestamp", "asc"));
            
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = '';
                snapshot.forEach((doc) => {
                    const msg = doc.data();
                    renderMessage(msg);
                });
                container.scrollTop = container.scrollHeight;
            });

            // Listen for room updates (users, typing, finish status)
            const roomRef = doc(db, "rooms", roomId);
            unsubscribeRoom = onSnapshot(roomRef, async (docSnap) => {
                if (!docSnap.exists()) {
                    leaveRoom("Room has been deleted");
                    return;
                }

                const data = docSnap.data();
                
                // Update online count
                document.getElementById('online-count').textContent = data.users?.length || 0;

                // Update typing indicator
                const typingUsers = Object.keys(data.typing || {}).filter(uid => uid !== currentUser.uid && data.typing[uid]);
                const indicator = document.getElementById('typing-indicator');
                if (typingUsers.length > 0) {
                    indicator.textContent = "Someone is typing...";
                } else {
                    indicator.textContent = "";
                }

                // Check finish status
                const allFinished = data.users.length > 0 && data.users.every(uid => data.finishStatus[uid] === true);
                if (allFinished) {
                    await deleteDoc(roomRef);
                    // Messages subcollection is deleted automatically in some Firestore setups, 
                    // but for security/cleanliness we usually delete the room and let the listener handle it.
                }
            });
        }

        function renderMessage(msg) {
            const container = document.getElementById('messages-container');
            const isMe = msg.userId === currentUser.uid;
            
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${isMe ? 'bubble-right' : 'bubble-left'}`;
            
            const time = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '...';
            
            bubble.innerHTML = `
                <div class="text-white text-sm break-words">${escapeHTML(msg.text)}</div>
                <div class="text-[10px] text-white/40 mt-1 text-right">${time}</div>
            `;
            
            container.appendChild(bubble);
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('message-input');
            const text = input.value.trim();

            if (!text) return;

            // Rate limiting (500ms)
            const now = Date.now();
            if (now - lastMessageTime < 500) {
                showToast("Slow down! Don't spam.");
                return;
            }

            try {
                const messagesRef = collection(db, "rooms", activeRoomId, "messages");
                await addDoc(messagesRef, {
                    text: text,
                    userId: currentUser.uid,
                    timestamp: serverTimestamp()
                });

                // Update activity
                const roomRef = doc(db, "rooms", activeRoomId);
                await updateDoc(roomRef, {
                    lastActivity: serverTimestamp()
                });

                input.value = '';
                lastMessageTime = now;
                updateTypingStatus(false);
            } catch (err) {
                console.error("Send message error:", err);
                showToast("Error sending message");
            }
        }

        async function updateTypingStatus(isTyping) {
            if (!activeRoomId) return;
            const roomRef = doc(db, "rooms", activeRoomId);
            await updateDoc(roomRef, {
                [`typing.${currentUser.uid}`]: isTyping
            });
        }

        async function finishChat() {
            if (!activeRoomId) return;
            try {
                const roomRef = doc(db, "rooms", activeRoomId);
                await updateDoc(roomRef, {
                    [`finishStatus.${currentUser.uid}`]: true,
                    lastActivity: serverTimestamp()
                });
                showToast("You marked the chat as finished. Waiting for others...");
            } catch (err) {
                console.error("Finish chat error:", err);
            }
        }

        function leaveRoom(reason) {
            if (unsubscribeMessages) unsubscribeMessages();
            if (unsubscribeRoom) unsubscribeRoom();
            
            activeRoomId = null;
            document.getElementById('chat-screen').classList.add('hidden');
            document.getElementById('landing-screen').classList.remove('hidden');
            document.getElementById('online-count-badge').classList.add('hidden');
            
            if (reason) showToast(reason);
        }

        // --- Event Listeners ---

        document.getElementById('btn-create-room').addEventListener('click', createRoom);
        document.getElementById('btn-join-room').addEventListener('click', joinRoom);
        document.getElementById('chat-form').addEventListener('submit', sendMessage);
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
        document.getElementById('btn-finish-chat').addEventListener('click', finishChat);
        
        document.getElementById('btn-copy-id').addEventListener('click', () => {
            navigator.clipboard.writeText(activeRoomId);
            showToast("Room ID copied to clipboard!");
        });

        document.getElementById('message-input').addEventListener('input', () => {
            updateTypingStatus(true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => updateTypingStatus(false), 2000);
        });

        // Periodic Inactivity Check (Client-side cleanup helper)
        setInterval(async () => {
            if (!activeRoomId) return;
            const roomRef = doc(db, "rooms", activeRoomId);
            const snap = await getDoc(roomRef);
            if (snap.exists()) {
                const data = snap.data();
                const lastActivity = data.lastActivity?.toDate();
                if (lastActivity && (new Date() - lastActivity > 120000)) {
                    await deleteDoc(roomRef);
                }
            }
        }, 30000);

    </script>
</body>
</html>
